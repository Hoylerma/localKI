services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_API=${OLLAMA_API:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - CHAT_MODEL=${CHAT_MODEL:-qwen3:8b}
      - CHUNK_SIZE=${CHUNK_SIZE:-1000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-100}
      - MAX_CONTEXT_CHARS=${MAX_CONTEXT_CHARS:-4000}
      - RAG_TOP_K=${RAG_TOP_K:-20}
      - WATCH_DIR=/app/watched_docs
      - WATCH_INTERVAL=300
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /mnt/dokumente/01_Internes/04_EDV_js/001_KI/:/app/watched_docs:ro
      - ./librechat_uploads:/app/uploads
    
    
    mem_limit: 16g

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat_ui
    extra_hosts:
      - "12353-DC01.bwi.local:192.168.48.2"
    ports:
      - "3080:3080"
    depends_on:
   
     mongodb:
          condition: service_healthy
     
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - JWT_SECRET=EinSehrLangerZufaelligerStringFuerBWI2026
      - JWT_REFRESH_SECRET=NochEinZufaelligerString123!
      - DOMAIN_CLIENT=http://localhost:3080
      - DOMAIN_SERVER=http://localhost:3080
      - LDAP_LOGIN_USES_USERNAME=true

  # NEU: Datenbank für Chat-Historie
  mongodb:
    image: mongo
    container_name: mongodb
    volumes:
      - ./mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:8.14
    platform: linux/amd64
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      - postgres
  
  rag_api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev:latest
    ports:
      - "8001:8000" # Mappt intern 8000 auf extern 8001, damit es nicht mit deinem Backend kollidiert
    depends_on:
      - postgres
    environment:
      # Hier sagen wir ihm: "Die Datenbank heißt postgres, nicht db!"
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - EMBEDDINGS_PROVIDER=ollama
      - EMBEDDINGS_MODEL=nomic-embed-text
      # Die URL zu deinem lokalen Ollama (wichtig für den Container)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  

volumes:  
  pgdata: